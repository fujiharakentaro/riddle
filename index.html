<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>宇宙謎</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a14; overflow: hidden; }

    #root {
      position: fixed; inset: 0; max-width: 430px; margin: 0 auto;
      font-family: 'Hiragino Kaku Gothic ProN','BIZ UDPGothic','Yu Gothic',sans-serif;
      user-select: none; -webkit-user-select: none; color: #fff;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 0;
    }

    #hub-title {
      font-size: min(3.6rem, 12vw); font-weight: 900; letter-spacing: 0.18em;
      color: #fff; margin-bottom: 12px;
    }

    #hub-sub {
      font-size: 0.85rem; letter-spacing: 0.25em; color: rgba(255,255,255,.35);
      margin-bottom: 56px;
    }

    #cards {
      display: flex; flex-direction: column; gap: 18px;
      width: 86%; max-width: 320px;
    }

    .card {
      display: block; text-decoration: none;
      background: transparent;
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 10px;
      padding: 22px 28px;
      cursor: pointer;
      transition: background .2s, border-color .2s, transform .15s;
      position: relative;
    }
    .card:hover {
      background: rgba(255,255,255,.06);
      border-color: rgba(255,255,255,.45);
      transform: translateY(-2px);
    }
    .card:active { transform: translateY(0) scale(0.98); }

    .card-num {
      font-size: 0.7rem; letter-spacing: 0.3em;
      color: rgba(255,255,255,.3);
      margin-bottom: 6px;
    }

    .card-title {
      font-size: 1.45rem; font-weight: bold; letter-spacing: 0.08em;
      color: #fff;
    }

    .card-arrow {
      position: absolute; right: 22px; top: 50%;
      transform: translateY(-50%);
      font-size: 1.1rem; color: rgba(255,255,255,.3);
      transition: color .2s, right .2s;
    }
    .card:hover .card-arrow {
      right: 16px; color: rgba(255,255,255,.7);
    }
  </style>
</head>
<body>
<div id="root">
  <div id="hub-title">宇宙謎</div>
  <div id="hub-sub">— PUZZLE COLLECTION —</div>

  <div id="cards">
    <a class="card" href="7seg.html">
      <div class="card-num">No. 01</div>
      <div class="card-title">7 lights</div>
      <div class="card-arrow">›</div>
    </a>
    <a class="card" href="suji.html">
      <div class="card-num">No. 02</div>
      <div class="card-title">Number</div>
      <div class="card-arrow">›</div>
    </a>
    <a class="card" href="3buttons.html">
      <div class="card-num">No. 03</div>
      <div class="card-title">3buttons</div>
      <div class="card-arrow">›</div>
    </a>
  </div>
</div>
</body>
</html>
