<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PITCH NOTE Pro</title>
    <style>
        :root {
            --bg: #f8faff;
            --header-bg: #ffffff;
            --card: #ffffff;
            --text-main: #2d3436;
            --text-sub: #b2bec3;
            --primary: #4facfe;
            --border: #edf2f7;
            --pastel-red: #ffc9d0;
            --pastel-green: #d1f7d1;
            --key-out: #f0f0f0;
            --key-in: #ffffff;
            --shadow: 0 10px 30px rgba(0,0,0,0.03);
        }

        body.dark-mode {
            --bg: #121212;
            --header-bg: #1e1e1e;
            --card: #1e1e1e;
            --text-main: #e0e0e0;
            --text-sub: #888;
            --primary: #00e5ff;
            --border: #333;
            --key-out: #333;
            --key-in: #444;
            --shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        body { 
            background: var(--bg); color: var(--text-main); font-family: -apple-system, sans-serif; 
            margin: 0; display: flex; flex-direction: column; height: 100vh; overscroll-behavior: none;
            transition: background 0.3s, color 0.3s;
        }

        header { 
            padding: 15px; display: flex; justify-content: space-between; align-items: center; 
            background: var(--header-bg); border-bottom: 1px solid var(--border); 
        }
        header h1 { margin: 0; font-size: 0.9rem; color: var(--primary); letter-spacing: 2px; font-weight: 900; }
        
        .theme-toggle { 
            background: var(--border); border: none; padding: 6px 12px; border-radius: 20px; 
            color: var(--text-main); font-size: 0.7rem; cursor: pointer;
        }

        .content { flex: 1; overflow-y: auto; padding: 15px; }
        .page { display: none; }
        .page.active { display: block; }

        nav { display: flex; justify-content: space-around; background: var(--header-bg); border-top: 1px solid var(--border); padding: 10px 0 calc(10px + env(safe-area-inset-bottom)); }
        nav button { background: none; border: none; font-size: 0.7rem; color: var(--text-sub); display: flex; flex-direction: column; align-items: center; gap: 5px; }
        nav button.active { color: var(--primary); font-weight: bold; }

        /* 検索・タブエリア */
        .search-container { position: sticky; top: 0; z-index: 10; background: var(--bg); padding-bottom: 10px; }
        #search-bar { width: 100%; padding: 15px; border: none; border-radius: 12px; box-shadow: var(--shadow); box-sizing: border-box; font-size: 1rem; outline: none; margin-bottom: 15px; background: var(--card); color: var(--text-main); }
        
        /* 四角いタブスタイル */
        .sort-tabs { 
            display: flex; 
            width: 100%; 
            background: var(--card); 
            border-radius: 10px; 
            overflow: hidden; 
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        .sort-btn { 
            flex: 1; 
            padding: 12px 5px; 
            border: none; 
            background: transparent; 
            font-size: 0.75rem; 
            color: var(--text-sub); 
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            border-right: 1px solid var(--border);
        }
        .sort-btn:last-child { border-right: none; }
        .sort-btn.active { 
            background: var(--primary); 
            color: white; 
        }

        /* シャッフルボタン */
        #shuffle-control {
            text-align: right;
            margin-top: 8px;
            display: none;
        }
        .action-link {
            color: var(--primary);
            font-size: 0.75rem;
            text-decoration: underline;
            background: none;
            border: none;
            cursor: pointer;
        }

        /* 曲カード */
        .song-card { background: var(--card); padding: 16px; border-radius: 15px; margin-bottom: 10px; box-shadow: var(--shadow); display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); }
        .song-card h3 { margin: 0; font-size: 0.9rem; font-weight: 700; }
        .song-card p { margin: 3px 0 0; font-size: 0.7rem; color: var(--text-sub); }
        
        .reserve-btn { 
            width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border); 
            display: flex; align-items: center; justify-content: center; font-size: 1rem;
            margin-right: 12px; background: var(--bg); color: var(--text-sub);
        }
        .reserve-btn.active { background: #ffcc00; border-color: #ffcc00; color: #fff; }

        /* モーダル・ピアノ */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: flex-end; z-index: 1000; }
        .modal-content { background: var(--card); width: 100%; padding: 25px 20px 40px; border-radius: 25px 25px 0 0; box-sizing: border-box; text-align: center; }
        .piano-wrap { width: 100%; overflow-x: auto; padding: 10px 0; margin: 15px 0; background: var(--header-bg); border-radius: 12px; }
        .piano { display: flex; width: fit-content; padding: 0 10px; }
        .key { width: 22px; height: 100px; flex-shrink: 0; position: relative; border-right: 1px solid var(--border); }
        .key.white { background: var(--key-out); }
        .key.black { background: #555; height: 60px; width: 14px; margin: 0 -7px; z-index: 2; border: none; border-radius: 0 0 3px 3px; }
        .in-range.white { background: var(--key-in) !important; }
        .in-range.black { background: #888 !important; }
        .active-low { background: var(--pastel-red) !important; border-bottom: 4px solid #ff8f9e !important; }
        .active-high { background: var(--pastel-green) !important; border-bottom: 4px solid #a8e6a8 !important; }
        
        .settings-card { background: var(--card); padding: 20px; border-radius: 20px; box-shadow: var(--shadow); }
        input { background: var(--bg); color: var(--text-main); border: 1px solid var(--border); }
        .sync-btn { width: 100%; padding: 14px; background: #333; color: white; border: none; border-radius: 12px; font-weight: bold; margin-bottom: 20px; }
        .add-btn { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <h1>PITCH NOTE</h1>
        <button class="theme-toggle" onclick="toggleDarkMode()" id="theme-btn">🌙 Dark</button>
    </header>

    <div class="content">
        <div id="page-search" class="page active">
            <div class="search-container">
                <input type="text" id="search-bar" placeholder="曲名・アーティスト名で検索..." oninput="render()">
                
                <div class="sort-tabs">
                    <button id="sort-random" class="sort-btn active" onclick="setSortMode('random')">ランダム</button>
                    <button id="sort-title" class="sort-btn" onclick="setSortMode('title')">曲名</button>
                    <button id="sort-artist" class="sort-btn" onclick="setSortMode('artist')">歌手</button>
                    <button id="sort-setlist" class="sort-btn" onclick="setSortMode('setlist')">予約済</button>
                </div>
                <div id="shuffle-control">
                    <button class="action-link" onclick="reshuffle()">↻ 曲順入れ替え</button>
                </div>
            </div>
            <div id="song-list"></div>
        </div>

        <div id="page-settings" class="page">
            <div class="settings-card">
                <button class="sync-btn" onclick="manualSync()">スプシから強制同期</button>
                <div style="margin-top:15px;">
                    <label style="font-size:0.7rem; font-weight:bold; color:var(--text-sub);">新規登録</label>
                    <input type="text" id="in-title" placeholder="曲名" style="width:100%; padding:12px; margin:8px 0; border-radius:10px; box-sizing:border-box;">
                    <input type="text" id="in-artist" placeholder="アーティスト" style="width:100%; padding:12px; margin-bottom:10px; border-radius:10px; box-sizing:border-box;">
                    <div style="display:flex; gap:10px;">
                        <input type="text" id="in-low" placeholder="最低(C3)" style="width:50%; padding:12px; border-radius:10px;">
                        <input type="text" id="in-high" placeholder="最高(G4)" style="width:50%; padding:12px; border-radius:10px;">
                    </div>
                    <input type="number" id="in-key" placeholder="マイキー" style="width:100%; padding:12px; margin:8px 0; border-radius:10px; box-sizing:border-box;">
                    <button class="add-btn" onclick="addSong()">スプシに登録</button>
                </div>
            </div>
        </div>
    </div>

    <div id="modal" class="modal" onclick="if(event.target==this)closeModal()">
        <div class="modal-content">
            <h2 id="m-title" style="margin:0; font-size:1.1rem;"></h2>
            <p id="m-artist" style="color:var(--text-sub); font-size:0.8rem; margin:5px 0 15px;"></p>
            <div style="display:flex; justify-content:space-around; background:rgba(0,0,0,0.05); padding:12px; border-radius:15px; margin-bottom:15px; font-size:0.8rem;">
                <div><small>原曲</small><br><b id="m-original-range"></b></div>
                <div style="color:var(--primary);"><small>適用後</small><br><b id="m-current-range"></b></div>
            </div>
            <div class="piano-wrap"><div class="piano" id="piano"></div></div>
            <div style="display:flex; align-items:center; justify-content:center; gap:40px;">
                <button style="width:55px; height:55px; border-radius:20px; border:2px solid var(--primary); background:none; color:var(--primary); font-size:1.5rem;" onclick="adjustKey(-1)">−</button>
                <div style="text-align:center;"><small style="color:var(--text-sub)">Key</small><br><b id="m-key" style="font-size:2rem; color:var(--primary);">0</b></div>
                <button style="width:55px; height:55px; border-radius:20px; border:2px solid var(--primary); background:none; color:var(--primary); font-size:1.5rem;" onclick="adjustKey(1)">＋</button>
            </div>
        </div>
    </div>

    <nav>
        <button id="nav-search" class="active" onclick="showPage('search')">🔍<span>検索</span></button>
        <button id="nav-settings" onclick="showPage('settings')">⚙️<span>設定</span></button>
    </nav>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxTeGnC1JOTE9Cjtj9o29n0d9aX_CsZ48jTkaOqA-H3U2PE_-duiHxWXcxuf-GkR0Pl/exec";
        let songs = JSON.parse(localStorage.getItem('k_pro_full_v6')) || [];
        let setlist = JSON.parse(localStorage.getItem('k_setlist')) || [];
        let currentSortMode = 'random'; // デフォルトをランダムに変更
        let shuffledSongs = []; // 固定されたランダムリスト
        let currentIndex = null;
        const NOTES = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];

        function toggleDarkMode() {
            const isDark = document.body.classList.toggle('dark-mode');
            document.getElementById('theme-btn').innerText = isDark ? "☀️ Light" : "🌙 Dark";
            localStorage.setItem('k_darkmode', isDark);
        }
        if(localStorage.getItem('k_darkmode') === 'true') toggleDarkMode();

        function toggleSetlist(e, songTitle, songArtist) {
            e.stopPropagation();
            const id = songTitle + songArtist;
            const idx = setlist.indexOf(id);
            if(idx > -1) setlist.splice(idx, 1);
            else setlist.push(id);
            localStorage.setItem('k_setlist', JSON.stringify(setlist));
            render();
        }

        async function syncToSheets(song, action) {
            if(!GAS_URL.includes("http")) return;
            try { await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ ...song, action: action }) }); } catch (e) { console.error(e); }
        }

        async function silentSync() {
            if(!GAS_URL.includes("http") || document.hidden) return;
            try {
                const res = await fetch(GAS_URL);
                const data = await res.json();
                const newSongs = data.map(d => ({ title: d.title, artist: d.artist, low: d.low.toUpperCase(), high: d.high.toUpperCase(), myKey: parseInt(d.myKey) || 0 }));
                
                // データ数が変わった場合のみランダムリストを初期化
                if(newSongs.length !== songs.length) {
                    songs = newSongs;
                    if(currentSortMode === 'random') reshuffle();
                } else {
                    songs = newSongs;
                }
                
                localStorage.setItem('k_pro_full_v6', JSON.stringify(songs));
                render();
            } catch(e) { console.error(e); }
        }

        async function manualSync() { await silentSync(); alert("同期完了！"); showPage('search'); }

        function setSortMode(mode) {
            currentSortMode = mode;
            document.querySelectorAll('.sort-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('sort-' + mode).classList.add('active');
            
            // ランダム制御ボタンの表示切り替え
            document.getElementById('shuffle-control').style.display = (mode === 'random') ? 'block' : 'none';
            
            // ランダムモードに入った時にリストが空ならシャッフル作成
            if(mode === 'random' && shuffledSongs.length === 0) reshuffle();
            
            render();
        }

        // ランダム順を新しく生成する
        function reshuffle() {
            shuffledSongs = [...songs].sort(() => Math.random() - 0.5);
            render();
        }

        function render() {
            const q = document.getElementById('search-bar').value.toLowerCase();
            const listContainer = document.getElementById('song-list');
            
            let displayList = (currentSortMode === 'random') ? [...shuffledSongs] : [...songs];
            
            // フィルタ
            let filtered = displayList.filter(s => s.title.toLowerCase().includes(q) || s.artist.toLowerCase().includes(q));
            
            // 並び替え（ランダム以外の場合のみ実行）
            if (currentSortMode === 'title') filtered.sort((a, b) => a.title.localeCompare(b.title, 'ja'));
            else if (currentSortMode === 'artist') filtered.sort((a, b) => a.artist.localeCompare(b.artist, 'ja'));
            else if (currentSortMode === 'setlist') filtered = filtered.filter(s => setlist.includes(s.title + s.artist));
            
            listContainer.innerHTML = filtered.map((s) => {
                const isReserved = setlist.includes(s.title + s.artist);
                return `
                <div class="song-card" onclick="openModal(${songs.indexOf(s)})">
                    <div style="display:flex; align-items:center;">
                        <div class="reserve-btn ${isReserved ? 'active' : ''}" onclick="toggleSetlist(event, '${s.title}', '${s.artist}')">
                            ${isReserved ? '★' : '＋'}
                        </div>
                        <div><h3>${s.title}</h3><p>${s.artist}</p></div>
                    </div>
                    <div class="key-tag">${s.myKey > 0 ? '+' : ''}${s.myKey}</div>
                </div>
            `}).join('');
        }

        // その他ロジック
        async function addSong() {
            const song = { title: document.getElementById('in-title').value, artist: document.getElementById('in-artist').value, low: document.getElementById('in-low').value.toUpperCase(), high: document.getElementById('in-high').value.toUpperCase(), myKey: parseInt(document.getElementById('in-key').value) || 0 };
            if(!song.title) return;
            await syncToSheets(song, "add");
            songs.push(song);
            if(currentSortMode === 'random') shuffledSongs.push(song);
            localStorage.setItem('k_pro_full_v6', JSON.stringify(songs));
            render();
            alert("登録しました！");
            showPage('search');
        }
        function showPage(p) { document.querySelectorAll('.page, nav button').forEach(el => el.classList.remove('active')); document.getElementById('page-'+p).classList.add('active'); document.getElementById('nav-'+p).classList.add('active'); render(); }
        function openModal(i) { currentIndex = i; document.getElementById('modal').style.display = 'flex'; updateModal(); }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        async function adjustKey(v) {
            songs[currentIndex].myKey += v;
            localStorage.setItem('k_pro_full_v6', JSON.stringify(songs));
            updateModal();
            render();
            await syncToSheets(songs[currentIndex], "update");
        }
        function spnToNum(spn) { const m = spn.match(/^([A-G]#?)(\d)$/); return m ? (parseInt(m[2]) + 1) * 12 + NOTES.indexOf(m[1]) : 0; }
        function numToSpn(num) { return NOTES[num % 12] + (Math.floor(num / 12) - 1); }
        function updateModal() {
            const s = songs[currentIndex];
            document.getElementById('m-title').innerText = s.title;
            document.getElementById('m-artist').innerText = s.artist;
            document.getElementById('m-key').innerText = (s.myKey > 0 ? '+' : '') + s.myKey;
            const lowCur = spnToNum(s.low) + s.myKey;
            const highCur = spnToNum(s.high) + s.myKey;
            document.getElementById('m-original-range').innerText = `${s.low}～${s.high}`;
            document.getElementById('m-current-range').innerText = `${numToSpn(lowCur)}～${numToSpn(highCur)}`;
            const piano = document.getElementById('piano');
            piano.innerHTML = '';
            for (let i = 36; i <= 84; i++) {
                const isBlack = [1,3,6,8,10].includes(i % 12);
                const k = document.createElement('div');
                k.className = `key ${isBlack ? 'black' : 'white'}`;
                if (i >= lowCur && i <= highCur) {
                    k.classList.add('in-range');
                    if (i === lowCur) k.classList.add('active-low');
                    else if (i === highCur) k.classList.add('active-high');
                }
                piano.appendChild(k);
            }
            setTimeout(() => { const active = document.querySelector('.active-low'); if(active) active.scrollIntoView({behavior:'smooth', inline:'center', block:'nearest'}); }, 100);
        }

        setInterval(silentSync, 30000);
        silentSync();
        render();
    </script>
</body>
</html>
